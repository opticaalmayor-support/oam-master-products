<div class="p-6 space-y-6">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold">Product Master</h1>

    <button
      type="button"
      class="rounded bg-primary-600 px-4 py-2 text-white"
      (click)="openCreateForm()"
    >
      Nuevo Producto
    </button>
  </div>

  <app-filter-product-page
    [mode]="'master'"
    [brands]="brands()"
    [collections]="collections()"
    (filtersChanged)="onUpdateFilters($event)"
    (activeFiltersChanged)="onActiveMasterFiltersChange($event)"
  >
  </app-filter-product-page>

  <div class="rounded border bg-white overflow-hidden">
    <app-selection-toolbar
      [selectedCount]="selectedProductIds.length"
      entityLabel="productos"
      (edit)="editSelectedProduct()"
      (delete)="deleteSelectedProducts()"
      (clear)="clearProductSelection()"
    >
    </app-selection-toolbar>

    <app-product-master-table
      [items]="products()"
      [selectedIds]="selectedProductIds"
      [visibleColumns]="visibleMasterColumns()"
      [inlineEditDisabled]="sequentialEditActive()"
      (selectionChange)="onProductSelectionChange($event)"
      (editRow)="editProduct($event)"
      (deleteRow)="deleteProduct($event)"
      (inlineSave)="onInlineSaveProduct($event)"
    >
    </app-product-master-table>
  </div>
  @if (sequentialEditActive()) {
    <div class="mb-4 rounded border border-indigo-200 bg-indigo-50 p-3">
      <div class="flex items-center justify-between">
        <div class="text-sm font-medium text-indigo-800">
          Editando {{ sequentialEditCurrentStep }} de {{ sequentialEditTotal }}
        </div>

        <div class="flex gap-2">
          <button
            type="button"
            class="rounded border border-indigo-300 bg-white px-3 py-1 text-sm text-indigo-700"
            (click)="skipSequentialProduct()"
          >
            Omitir
          </button>

          <button
            type="button"
            class="rounded border border-red-300 bg-white px-3 py-1 text-sm text-red-700"
            (click)="cancelSequentialEdit()"
          >
            Cancelar secuencia
          </button>
        </div>
      </div>
    </div>
  }
  <app-sidebar
    [open]="showForm()"
    position="right"
    widthClass="max-w-4xl"
    [title]="isEditMode() ? 'Editar Product Master' : 'Nuevo Product Master'"
    (closed)="closeForm()"
  >
    <app-product-master-workspace
      [showForm]="showForm()"
      [isEditMode]="isEditMode()"
      [productForm]="productForm"
      [variantForm]="variantForm"
      [createConfig]="computedProductCreateConfig"
      [editConfig]="computedProductEditConfig"
      [brands]="brands()"
      [collections]="collections()"
      [selectedProductId]="canManageVariants() ? selectedProductId() : null"
      [productVariants]="canManageVariants() ? productVariants() : []"
      [selectedBrand]="selectedBrand()"
      [selectedCollection]="selectedCollection()"
      [brandMode]="brandMode()"
      [collectionMode]="collectionMode()"
      (closed)="closeForm()"
      (saveProduct)="onSaveProduct()"
      (saveVariant)="onSaveVariant()"
      (brandSubmitted)="onBrandSubmitted($event)"
      (collectionSubmitted)="onCollectionSubmitted($event)"
      (createBrand)="startCreateBrand()"
      (editBrand)="startEditBrand($event)"
      (showBrand)="showBrand($event)"
      (deleteBrand)="deleteBrand($event)"
      (createCollection)="startCreateCollection()"
      (editCollection)="startEditCollection($event)"
      (showCollection)="showCollection($event)"
      (deleteCollection)="deleteCollection($event)"
      [selectedVariantId]="canManageVariants() ? selectedVariantId() : null"
      (editVariant)="editProductVariant($event)"
      (deleteVariant)="deleteProductVariant($event)"
      (createVariant)="resetVariantForm()"
      (fullEditVariants)="openFullEditVariants()"
      (editVariantWithImage)="openVariantImageEdit($event)"
    >
    </app-product-master-workspace>
  </app-sidebar>
</div>
