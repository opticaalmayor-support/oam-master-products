@if (selectedCount > 0) {
  <div class="mb-4 flex items-center justify-between rounded border border-blue-200 bg-blue-50 p-3">
    <div>
      <strong>{{ selectedCount }}</strong> {{ entityLabel }} seleccionados
    </div>

    <div class="flex gap-2">
      @if (selectedCount === 1) {
        <button
          type="button"
          class="rounded bg-blue-600 px-3 py-1 text-white"
          (click)="edit.emit()"
        >
          Editar
        </button>
      }

      @if (selectedCount > 1) {
        <button
          type="button"
          class="rounded bg-indigo-600 px-3 py-1 text-white"
          (click)="edit.emit()"
        >
          Editar varios
        </button>
      }

      <button type="button" class="rounded bg-red-600 px-3 py-1 text-white" (click)="delete.emit()">
        Eliminar
      </button>

      <button type="button" class="rounded bg-gray-500 px-3 py-1 text-white" (click)="clear.emit()">
        Limpiar
      </button>
    </div>
  </div>
}
