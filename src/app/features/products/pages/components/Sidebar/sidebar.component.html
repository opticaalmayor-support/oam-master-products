@if (open) {
  <div class="fixed inset-0 bg-black/30 z-40" (click)="onBackdropClick()"></div>

  <div
    class="fixed top-0 h-full w-full bg-white shadow-2xl z-50 overflow-y-auto"
    [ngClass]="[widthClass, position === 'left' ? 'left-0' : 'right-0']"
  >
    <div class="flex items-center justify-between px-6 py-4 border-b sticky top-0 bg-white z-10">
      <h2 class="text-lg font-bold text-gray-800">{{ title }}</h2>

      <button
        type="button"
        (click)="onClose()"
        class="text-gray-500 hover:text-red-500 text-xl leading-none"
      >
        ✕
      </button>
    </div>

    <div class="p-6">
      <ng-content></ng-content>
    </div>
  </div>
}
