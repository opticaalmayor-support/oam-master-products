<div class="p-4 relative">
  <div class="flex justify-between items-center mb-4">
    <h1 class="text-2xl font-bold text-gray-800">Variantes de Producto</h1>
  </div>

  <app-filter-product-page [mode]="'variant'" (filtersChanged)="onUpdateFilters($event)">
  </app-filter-product-page>

  <app-selection-toolbar
    [selectedCount]="selectedIds.length"
    entityLabel="variantes"
    (edit)="editSelected()"
    (delete)="deleteSelected()"
    (clear)="clearSelection()"
  >
  </app-selection-toolbar>

  <app-product-variant-table
    [items]="variants()"
    [selectedIds]="selectedIds"
    [inlineEditDisabled]="isPageBusy()"
    (selectionChange)="onSelectionChange($event)"
    (editRow)="editVariant($event)"
    (deleteRow)="deleteVariant($event)"
    (inlineSave)="onInlineSaveVariant($event)"
  >
  </app-product-variant-table>

  @if (loading()) {
    <div class="py-8 text-center text-gray-500">Cargando variantes...</div>
  }

  @if (sequentialEditActive()) {
    <div class="mb-4 mt-4 rounded border border-indigo-200 bg-indigo-50 p-3">
      <div class="flex items-center justify-between">
        <div class="text-sm font-medium text-indigo-800">
          Editando {{ sequentialEditIndex() + 1 }} de {{ sequentialEditIds.length }}
        </div>

        <div class="flex gap-2">
          <button
            type="button"
            class="rounded border border-red-300 bg-white px-3 py-1 text-sm text-red-700"
            (click)="cancelSequentialEdit()"
          >
            Cancelar secuencia
          </button>
        </div>
      </div>
    </div>
  }

  <app-sidebar
    [open]="showForm()"
    position="left"
    [title]="'Editar Variante'"
    [widthClass]="'max-w-xl'"
    (closed)="closeForm()"
  >
    <app-edit-crud
      [form]="variantForm"
      [config]="variantEditConfig"
      (closed)="closeForm()"
      (submitted)="onSaveVariant()"
    >
    </app-edit-crud>
  </app-sidebar>
</div>
