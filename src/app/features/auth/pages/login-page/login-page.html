<div class="min-h-screen bg-slate-100 flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white border border-slate-200 rounded-xl shadow-sm p-6 sm:p-8">
    <h1 class="text-2xl font-semibold text-slate-900">Iniciar sesion</h1>
    <p class="mt-1 text-sm text-slate-600">Accede a OAM Master con tu cuenta Maestro.</p>

    <form class="mt-6 space-y-4" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div>
        <label for="email" class="block text-sm font-medium text-slate-700">Correo</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="mt-1 block w-full rounded-lg border-slate-300 focus:border-blue-500 focus:ring-blue-500"
          placeholder="usuario@empresa.com"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-slate-700">Contrasena</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="mt-1 block w-full rounded-lg border-slate-300 focus:border-blue-500 focus:ring-blue-500"
          placeholder="********"
        />
      </div>

      <label class="flex items-center gap-2 text-sm text-slate-700">
        <input type="checkbox" formControlName="remember" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500" />
        Recordarme
      </label>

      @if (errorMessage()) {
        <p class="text-sm text-red-600">{{ errorMessage() }}</p>
      }

      <button
        type="submit"
        class="w-full rounded-lg bg-blue-600 px-4 py-2.5 text-white font-medium hover:bg-blue-700 disabled:opacity-60"
        [disabled]="authService.isLoading()"
      >
        @if (authService.isLoading()) {
          Ingresando...
        } @else {
          Entrar
        }
      </button>
    </form>
  </div>
</div>
